name: Bug Report
description: Something is broken in the tasting app
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Go to ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: form_type
    attributes:
      label: Which form / area?
      options:
        - Wine (SAT)
        - Champagne
        - Spirits
        - Non-alcoholic
        - Aroma picker
        - Biodynamic calendar
        - Archive / Search
        - Export / Import
        - Other
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, app version or commit
    validations:
      required: false
